{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h3 class="mb-0"><i class="bi bi-pencil"></i> Editar cita</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-dog"></i> Mascota:</label>
                        <input type="text" name="mascota" value="{{ cita[1] }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-person"></i> Propietario:</label>
                        <input type="text" name="propietario" value="{{ cita[2] }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-tags"></i> Especie:</label>
                        <input type="text" name="especie" value="{{ cita[3] }}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-calendar3"></i> Fecha:</label>
                        <input type="text" name="fecha" value="{{ cita[4] }}" class="form-control" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Actualizar
                        </button>
                        <a href="/" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
